name: Deploy Avalonia WASM to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish (Browser)
        run: dotnet publish ./WasmApp.Browser/WasmApp.Browser.csproj -c Release -o ./published

      # Add .nojekyll to prevent GitHub Pages from ignoring _framework folder
      - name: Add .nojekyll file
        run: touch ./published/wwwroot/.nojekyll

      # Update base href - use a more reliable method
      - name: Update base href in index.html
        run: |
          sed -i '/<head>/a\    <base href="/AvaloniaApplication2/" />' ./published/wwwroot/index.html
          echo "--- Updated index.html ---"
          cat ./published/wwwroot/index.html

      # SPA fallback for refresh/deep links on GitHub Pages
      - name: Add SPA fallback (404.html)
        run: cp ./published/wwwroot/index.html ./published/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./published/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5